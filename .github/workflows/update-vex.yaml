name: Update VEX Documents

on:
  repository_dispatch:
    types: [vex-assessments-updated]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  update-vex:
    name: Generate and update VEX content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vex-repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            LIQUIBASE,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout liquibase-pro (sparse)
        uses: actions/checkout@v4
        with:
          repository: liquibase/liquibase-pro
          token: ${{ steps.get-token.outputs.token }}
          path: liquibase-pro
          sparse-checkout: |
            vex
          sparse-checkout-cone-mode: true

      - name: Install vexctl
        run: |
          sudo curl -sSfL "https://github.com/openvex/vexctl/releases/download/v0.3.0/vexctl-linux-amd64" -o /usr/local/bin/vexctl
          echo "cd7f8b57d20642166ed4eb3dd1fd849bbb30bbd7c5b9f5b0316b6003b57ceaba  /usr/local/bin/vexctl" | sha256sum -c -
          sudo chmod +x /usr/local/bin/vexctl
          vexctl version

      - name: Install yq
        run: |
          sudo curl -sSfL "https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64" -o /usr/local/bin/yq
          echo "0c2b24e645b57d8e7c0566d18643a6d4f5580feeea3878127354a46f2a1e4598  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Generate VEX repo content
        run: |
          bash liquibase-pro/vex/generate-vex-repo.sh \
            --output-dir ./repo-content \
            --assessments liquibase-pro/vex/assessments.yaml

      - name: Validate VEX repo
        run: bash liquibase-pro/vex/validate-vex-repo.sh ./repo-content

      - name: Copy generated content to repo root
        run: |
          # Copy generated files, preserving directory structure
          cp -f ./repo-content/vex-repository.json ./vex-repository.json
          cp -f ./repo-content/index.json ./index.json
          # Copy the package directory tree
          rm -rf ./pkg
          cp -r ./repo-content/pkg ./pkg

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.get-token.outputs.token }}
          commit-message: "chore: update VEX documents from liquibase-pro assessments"
          title: "chore: update VEX documents"
          body: |
            Automated update from `liquibase-pro/vex/assessments.yaml`.

            This PR was generated by the `update-vex` workflow. Review the
            changes to VEX documents and merge when ready.
          branch: automation/update-vex
          delete-branch: true
